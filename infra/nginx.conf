server {
    listen 80;
    client_max_body_size 10M;

    location /api/docs/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/redoc.html;
    }
    
    location /api/ {
        proxy_set_header Host $http_host;
        proxy_pass http://host.docker.internal:8000/api/;
    }
    
    location /s/ {
        proxy_set_header Host $http_host;
        proxy_pass http://host.docker.internal:8000/s/;
        proxy_redirect http://host.docker.internal:8000/ /;
    }

    # location /recipes/ {
    #     proxy_set_header Host $http_host;
    #     proxy_pass http://host.docker.internal:8000/api/recipes/;
    # }

    # location /tags/ {
    #     proxy_set_header Host $http_host;
    #     proxy_pass http://host.docker.internal:8000/api/tags/;
    # }

    # location /users/ {
    #     proxy_set_header Host $http_host;
    #     proxy_pass http://host.docker.internal:8000/api/users/;
    # }

    # location /ingredients/ {
    #     proxy_set_header Host $http_host;
    #     proxy_pass http://host.docker.internal:8000/api/ingredients/;
    # }

    location /admin/ {
        proxy_set_header Host $http_host;
        proxy_pass http://host.docker.internal:8000/admin/;
    }
    
    location /static/ {
        proxy_pass http://host.docker.internal:8000/static/;
    }

    location /media/ {
        proxy_pass http://host.docker.internal:8000/media/;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri /index.html;
    }
}
