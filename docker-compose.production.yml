version: '3'

volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:15
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    image: lima82/foodgram_backend:latest
    env_file: .env
    volumes:
      - static:/backend_static
      - media:/app/media
    depends_on:
      - db
  frontend:
    image: lima82/foodgram_frontend:latest
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static:/frontend_static
    depends_on:
      - backend

  # gateway:
  #   build: ./infra
  #   ports:
  #     - 8000:80
  #   volumes:
  #     - static:/staticfiles/
  #     - media:/media
  #     - ./docs/:/usr/share/nginx/html/api/docs/
  #   depends_on:
  #     - backend
  #     - frontend
  gateway:
    image: lima82/foodgram_gateway:latest
    # image: nginx:1.25.4-alpine
    ports:
      - 8000:80
    volumes:
    #  - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static:/staticfiles/
      - media:/media
    #  - ./docs/:/usr/share/nginx/html/api/docs/
      - ./docs/:/usr/share/nginx/html/
    depends_on:
      - backend
      - frontend
